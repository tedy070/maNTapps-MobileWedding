<!DOCTYPE html>
<html lang="id" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Wedding Planner</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">

<link rel="icon" type="image/png" sizes="192x192" href="maNTapps_MobileWedding_android.PNG">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#7D3C52;--rose-light:#F5D6E3;--rose-dark:#5C2A3C;--rose-mid:#C0637D;--teal:#3D7A6E;--teal-light:#E2F5F0;--teal-dark:#2A5C52;--cream:#FAF8F5;--white:#FFFFFF;--border:#E5DDD6;--border-light:#EEE8E2;--gray:#6B6460;--gray-light:#F0EBE6;--dark:#2C1A14;--pink-bg:#FDE8F2;--pink-card:#F9EEF4;--amber-bg:#FEF3E2;--amber:#8B5E1A;--success-bg:#E2F5F0;--success:#1A6B55;--danger-bg:#FFECEC;--danger:#8B2020;--bg-page:#E0D8D0;--shadow:rgba(0,0,0,.15);}
.dark{--cream:#1A1410;--white:#242018;--border:#3A3028;--border-light:#302820;--gray:#A8A098;--gray-light:#2E2820;--dark:#F0EAE0;--pink-bg:#2E1820;--pink-card:#281618;--amber-bg:#2A200A;--amber:#D4A050;--success-bg:#0E2018;--success:#4ACC8A;--danger-bg:#200A0A;--danger:#FF6B6B;--bg-page:#100C08;--rose-light:#3A1828;--teal-light:#0E2018;}
html,body{height:100%;background:var(--bg-page);transition:background .3s}
body{font-family:"DM Sans",sans-serif;color:var(--dark);overflow-x:hidden;transition:color .3s}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--cream);box-shadow:0 0 60px var(--shadow);transition:background .3s}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 12px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:60;flex-shrink:0;transition:background .3s}
.brand{font-family:"Cormorant Garamond",serif;font-size:20px;color:var(--teal);font-style:italic;font-weight:600;letter-spacing:.5px}
.hicons{display:flex;gap:6px}
.hicon{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);transition:all .2s;flex-shrink:0}
.hicon:hover{background:var(--gray-light);color:var(--dark)}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:80px}
.screen::-webkit-scrollbar{display:none}
.tabbar{display:flex;background:var(--white);border-top:1px solid var(--border);flex-shrink:0;transition:background .3s}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:11px 0 13px;cursor:pointer;font-size:8px;color:var(--gray);gap:4px;border-top:2.5px solid transparent;transition:all .2s;letter-spacing:.2px;text-transform:uppercase;font-weight:500;user-select:none}
.tab.active{color:var(--teal);border-top-color:var(--teal)}
.tab i{font-size:20px;line-height:1}
.card{background:var(--white);border-radius:16px;padding:16px;margin:0 14px 12px;border:1px solid var(--border);transition:background .3s}
.card-sm{background:var(--white);border-radius:12px;padding:12px 14px;border:1px solid var(--border);transition:background .3s}
.grad-card{background:linear-gradient(135deg,#F9E4EE,#DFF0EB);border-radius:16px;padding:16px;margin:0 14px 12px}
.dark .grad-card{background:linear-gradient(135deg,#2E1820,#0E2018)}
.hero-banner{padding:22px 20px 18px}
.hero-banner h1{font-family:"Cormorant Garamond",serif;font-size:44px;font-weight:700;color:var(--dark);line-height:1;letter-spacing:-1px}
.hero-banner p{font-size:13px;color:var(--rose-mid);margin-top:6px}
.section-head{font-family:"Cormorant Garamond",serif;font-size:36px;font-weight:700;color:var(--dark);line-height:1.05}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.badge-green{background:var(--success-bg);color:var(--success)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-gray{background:var(--gray-light);color:var(--gray)}
.badge-red{background:var(--danger-bg);color:var(--danger)}
.pill-row{display:flex;gap:7px;padding:0 14px 14px;overflow-x:auto;scrollbar-width:none}
.pill-row::-webkit-scrollbar{display:none}
.pill{padding:7px 15px;border-radius:50px;border:1px solid var(--border);background:var(--white);color:var(--gray);font-size:12.5px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:"DM Sans",sans-serif}
.pill:hover{border-color:var(--teal);color:var(--teal)}
.pill.active{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600}
.progress-bar{height:5px;background:var(--gray-light);border-radius:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--rose),var(--teal))}
.fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--teal));border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;position:fixed;bottom:82px;right:calc(50% - 226px);box-shadow:0 4px 18px rgba(93,44,60,.35);transition:transform .15s;z-index:50}
@media(max-width:480px){.fab{right:18px}}
.fab:hover{transform:scale(1.07)}
.fab:active{transform:scale(.96)}
.field-label{font-size:10px;font-weight:600;color:var(--gray);letter-spacing:.7px;margin-bottom:4px;margin-top:15px;display:block;text-transform:uppercase}
.input-field{width:100%;border:none;border-bottom:1.5px solid var(--border);background:transparent;padding:8px 0;font-size:14px;font-family:"DM Sans",sans-serif;outline:none;color:var(--dark);transition:border-color .2s}
.input-field:focus{border-bottom-color:var(--teal)}
textarea.input-field{border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;min-height:80px;resize:none}
textarea.input-field:focus{border-color:var(--teal)}
.money-wrap{display:flex;align-items:baseline;gap:7px;border-bottom:1.5px solid var(--border);padding:4px 0;transition:border-color .2s}
.money-wrap:focus-within{border-bottom-color:var(--teal)}
.money-pfx{font-size:17px;font-weight:500;color:var(--gray);flex-shrink:0}
.money-input{border:none;background:transparent;font-size:22px;font-weight:700;font-family:"DM Sans",sans-serif;color:var(--dark);outline:none;width:100%}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--rose-dark),var(--teal-dark));color:#fff;border:none;border-radius:50px;padding:14px;font-family:"DM Sans",sans-serif;font-size:14px;cursor:pointer;font-weight:600;margin-top:18px;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.btn-danger{width:100%;background:linear-gradient(135deg,#8B2020,#5C2A3C);color:#fff;border:none;border-radius:50px;padding:13px;font-family:"DM Sans",sans-serif;font-size:13.5px;cursor:pointer;font-weight:600;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-outline-danger{width:100%;border:1.5px solid #E0A0A0;background:transparent;color:var(--danger);border-radius:12px;padding:13px;font-family:"DM Sans",sans-serif;font-size:14px;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:500}
.modal-overlay{position:fixed;inset:0;background:rgba(30,15,10,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--white);border-radius:24px 24px 0 0;padding:24px 20px 44px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;scrollbar-width:none;transition:background .3s}
.modal-sheet::-webkit-scrollbar{display:none}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 20px}
.modal-title{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:700;color:var(--dark);margin-bottom:2px}
.subpage{position:fixed;inset:0;background:var(--cream);z-index:100;overflow-y:auto;scrollbar-width:none;display:none;transition:background .3s}
.subpage.open{display:block}
.subpage::-webkit-scrollbar{display:none}
.back-header{display:flex;align-items:center;gap:12px;padding:14px 18px 13px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;transition:background .3s}
.back-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);transition:all .2s;flex-shrink:0}
.doc-row{display:flex;gap:13px;align-items:flex-start;padding:14px 16px;background:var(--white);border-radius:14px;margin:0 14px 10px;border:1px solid var(--border);transition:all .2s}
.circle-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .2s;cursor:pointer}
.vendor-img{height:110px;background:var(--gray-light);border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:12px;overflow:hidden}
.cat-tag{position:absolute;top:9px;right:9px;background:var(--rose-dark);color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.rsvp-seg{padding:12px 10px;border-radius:12px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;text-align:center;font-family:"DM Sans",sans-serif;font-size:13px;transition:all .18px}
.rsvp-seg.active{border-color:var(--rose);color:var(--rose);background:var(--pink-bg)}
.toggle-sw{width:44px;height:24px;border-radius:12px;position:relative;cursor:pointer;transition:background .22s;flex-shrink:0;border:none;padding:0}
.toggle-sw .knob{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .22s;box-shadow:0 1px 4px rgba(0,0,0,.22)}
.notif-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border-light)}
.notif-row:last-child{border-bottom:none}
.tx-row{display:flex;align-items:center;gap:12px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--border-light)}
.tx-row:last-child{padding-bottom:0;margin-bottom:0;border-bottom:none}
.tx-icon{width:40px;height:40px;border-radius:12px;background:var(--gray-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gray)}
.stat-card{border-radius:14px;padding:12px 14px;text-align:center}
.stat-num{font-size:24px;font-weight:700;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:9.5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:var(--dark);color:var(--cream);padding:9px 20px;border-radius:50px;font-size:13px;z-index:500;pointer-events:none;opacity:0;transition:opacity .25s;font-weight:500;white-space:nowrap;max-width:88vw;text-align:center}
.toast.show{opacity:1}
.setting-row{display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid var(--border-light);cursor:pointer}
.setting-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.couple-card{background:linear-gradient(160deg,#F9D8E8,#DFF0EB);margin:14px;border-radius:20px;padding:24px 18px;text-align:center}
.dark .couple-card{background:linear-gradient(160deg,#2E1820,#0E2018)}
.avatar{width:78px;height:78px;border-radius:50%;background:var(--white);margin:0 auto;display:flex;align-items:center;justify-content:center;border:3px solid rgba(255,255,255,.8);overflow:hidden}
.days-pill{background:rgba(255,255,255,.85);border-radius:12px;padding:10px 20px;display:inline-block;margin-top:12px}
.dark .days-pill{background:rgba(40,30,20,.85)}
.help-topic-card{background:var(--white);border-radius:14px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.help-topic-head{padding:13px 16px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border-light)}
.help-topic-item{padding:12px 16px;font-size:13.5px;color:var(--dark);border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.help-topic-item:last-child{border-bottom:none}
.help-topic-item:hover{background:var(--cream)}
.edit-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);flex-shrink:0;transition:all .18s}
.edit-btn:hover{background:var(--teal-light);border-color:var(--teal);color:var(--teal)}
.photo-box{border:2px dashed var(--border);border-radius:12px;overflow:hidden;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.photo-box:hover{border-color:var(--teal)}
.photo-box img{width:100%;height:100%;object-fit:cover}
.photo-overlay{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border-radius:20px;padding:4px 10px;font-size:11px;display:flex;align-items:center;gap:4px}
.cat-picker-overlay{position:fixed;inset:0;background:rgba(30,15,10,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.cat-picker-sheet{background:var(--cream);border-radius:24px 24px 0 0;padding:18px 16px 36px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;scrollbar-width:none}
.cat-picker-sheet::-webkit-scrollbar{display:none}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.cat-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:12px 11px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:7px;position:relative}
.cat-card:hover{border-color:var(--rose-mid);transform:translateY(-1px)}
.cat-card.selected{border-color:var(--rose);background:var(--pink-bg)}
.cat-card.selected::after{content:"\2713";position:absolute;top:8px;right:9px;font-size:10px;font-weight:700;color:var(--rose);background:var(--rose-light);width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cat-icon-wrap{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center}
.cat-icon-wrap i{font-size:21px}
.cat-name{font-weight:700;font-size:13px;color:var(--dark);line-height:1.2}
.cat-sub{font-size:9.5px;font-weight:600;color:var(--gray);letter-spacing:.4px;text-transform:uppercase}
.cat-confirm-bar{position:sticky;bottom:0;background:var(--cream);padding:12px 0 0}
.cat-confirm-btn{width:100%;background:linear-gradient(135deg,var(--rose-dark),var(--teal-dark));color:#fff;border:none;border-radius:50px;padding:14px;font-family:"DM Sans",sans-serif;font-size:14px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
.cat-trigger{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;background:var(--white);display:flex;align-items:center;gap:10px;cursor:pointer;margin-top:6px;transition:border-color .2s}
.cat-trigger:hover{border-color:var(--teal)}
.cat-trigger-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-trigger-icon i{font-size:17px}
.lang-picker-overlay{position:fixed;inset:0;background:rgba(30,15,10,.5);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.lang-picker-box{background:var(--white);border-radius:20px;padding:24px 20px;width:88%;max-width:340px}
.lang-option{display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:14px;cursor:pointer;border:2px solid var(--border);margin-bottom:10px;transition:all .2s}
.lang-option:last-child{margin-bottom:0}
.lang-option.active,.lang-option:hover{border-color:var(--teal);background:var(--teal-light)}
.theme-card:hover{transform:translateY(-2px)}
.theme-card.active{box-shadow:0 4px 14px rgba(0,0,0,.12)}
.lang-flag{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px}
.notif-dot{position:absolute;top:5px;right:5px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:1.5px solid var(--white)}
#btn-notif{position:relative}
</style>
</head>

<div class="app" id="app-root">
  <div class="header">
    <span class="brand">Wedding Planner</span>
    <div class="hicons">
      <button class="hicon" id="btn-notif"><i class="ti ti-bell"></i></button>
      <button class="hicon" id="btn-profile"><i class="ti ti-user-circle"></i></button>
    </div>
  </div>
  <div class="screen" id="main-screen">
    <div id="page-ringkasan"></div>
    <div id="page-anggaran" style="display:none"></div>
    <div id="page-seserahan" style="display:none"></div>
    <div id="page-tamu" style="display:none"></div>

    <div class="tab" id="tab-tamu"><i class="ti ti-users"></i><span>Tamu</span></div>
    <div class="tab" id="tab-dokumen"><i class="ti ti-checklist"></i><span>Persiapan</span></div>
    <div class="tab" id="tab-vendor"><i class="ti ti-building-store"></i><span>Vendor</span></div>
  </div>
</div>
<div class="modal-overlay" id="modal-overlay">

</div>
<div class="modal-overlay" id="wa-modal-overlay" style="align-items:center;padding:16px">

function buildWaMessage(name){
  const link=(S.waLink||"").trim();
  const tpl=(S.waTemplate||"").trim();
  const encodedName=encodeURIComponent(name);
  const fullLink=link+(link.includes("?to=")?"":"")+encodedName;

/* ── Totals ── */
function totals(){
  const out=S.transactions.filter(t=>t.type==="out"||t.type==="pay").reduce((a,t)=>a+t.amount,0);
  const xIn=S.transactions.filter(t=>t.type==="in").reduce((a,t)=>a+t.amount,0);
  const docDone=S.documents.filter(d=>d.status==="Selesai").length;
  const docPct=Math.round(docDone/Math.max(S.documents.length,1)*100);
  const totalG=S.guests.reduce((a,g)=>a+g.count,0);
  const hadir=S.guests.filter(g=>g.rsvp==="Hadir").reduce((a,g)=>a+g.count,0);
  const tunggu=S.guests.filter(g=>g.rsvp==="Menunggu").reduce((a,g)=>a+g.count,0);
  const tidakH=S.guests.filter(g=>g.rsvp==="Tidak Hadir").reduce((a,g)=>a+g.count,0);
  const sesDone=S.seserahan.filter(i=>["Siap","Sudah Dibeli","Sudah Dihias"].includes(i.status)).length;
  const sesCost=S.seserahan.reduce((a,i)=>a+i.price,0);
  const souvDone=(S.souvenir||[]).filter(i=>["Siap","Sudah Dibeli"].includes(i.status)).length;
  const souvCost=(S.souvenir||[]).reduce((a,i)=>a+(i.qty||1)*i.price,0);
  const vcost=S.vendors.reduce((a,v)=>a+v.cost,0);
  return{out,xIn,saldo:S.income+xIn-out,docDone,docPct,totalG,hadir,tunggu,tidakH,sesDone,sesCost,souvDone,souvCost,vcost};
}

/* ── Push Notification ── */
async function requestPushPermission(){
  if(!("Notification" in window))return;
  if(Notification.permission==="default"){
    const result=await Notification.requestPermission();
    if(result==="granted"){S.notif.pushOn=true;showToast("🔔 Notifikasi push diaktifkan!");}
  }
}
function sendPushNotif(title,body,icon){
  if(!S.notif||!S.notif.pushOn)return;
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  try{
    new Notification(title,{body:body||"",icon:icon||"maNTapps_MobileWedding_android.PNG",badge:"maNTapps_MobileWedding_android.PNG",tag:"wedding-planner-"+Date.now()});
  }catch(e){}
}

function refreshGuestList(){
  const q=S.guestSearch.toLowerCase();
  const gf=S.guestFilter||"Semua";
  const gdr=S.genderFilter||"Semua";
  const vipF=S.vipFilter||"Semua";
  const filterMode=S.guestFilterMode||"gender";
  const vipLevelOf=g=>g.vipLevel||(g.vip?"VIP":"Biasa");
  /* Apply all filters together */
  const filtered=S.guests.filter(g=>{
    const mq=!q||g.name.toLowerCase().includes(q)||g.group.toLowerCase().includes(q);
    const mf=gf==="Semua"||g.group===gf;
    const mg=filterMode==="gender"?(gdr==="Semua"||(g.gender||"Pria")===gdr):(vipF==="Semua"||vipLevelOf(g)===vipF);
    return mq&&mf&&mg;
  });
  /* Update guest list */
  const el=document.getElementById("guest-list");
  if(el){el.innerHTML=filtered.map(guestCard).join("");bindListEvents();}
  /* Update group filter pills active state + counts */
  const GFILTERS=[["Semua","Semua"],["Teman Wanita","Teman Wanita"],["Teman Pria","Teman Pria"]];
  const countGF=f=>S.guests.filter(g=>f==="Semua"||g.group===f).reduce((a,g)=>a+g.count,0);
  document.querySelectorAll("[data-guest-filter]").forEach(p=>{
    const v=p.dataset.guestFilter;
    const entry=GFILTERS.find(([fv])=>fv===v);
    if(entry)p.innerHTML=entry[1]+`<span style="font-size:10px;opacity:.7;margin-left:4px">(${countGF(v)})</span>`;
    p.classList.toggle("active",v===gf);
  });
  /* Update gender filter pills active state + counts */
  const countGdr=gender=>S.guests.filter(g=>{
    const matchGroup=gf==="Semua"||g.group===gf;
    const matchGender=gender==="Semua"||(g.gender||"Pria")===gender;
    return matchGroup&&matchGender;
  }).reduce((a,g)=>a+g.count,0);
  document.querySelectorAll("[data-gender-filter]").forEach(p=>{
    const v=p.dataset.genderFilter;
    const lblMap={Semua:"Semua",Pria:"Pria",Wanita:"Wanita"};
    const icMap={Semua:"ti-users",Pria:"ti-man",Wanita:"ti-woman"};
    if(lblMap[v])p.innerHTML=`<i class="ti ${icMap[v]}" style="font-size:13px"></i>${lblMap[v]}<span style="font-size:10px;opacity:.7;margin-left:2px">(${countGdr(v)})</span>`;
    p.classList.toggle("active",v===gdr);
  });
  /* Update vip filter pills active state + counts */
  const countVip=level=>S.guests.filter(g=>{
    const matchGroup=gf==="Semua"||g.group===gf;
    const matchVip=level==="Semua"||vipLevelOf(g)===level;
    return matchGroup&&matchVip;
  }).reduce((a,g)=>a+g.count,0);
  document.querySelectorAll("[data-vip-filter]").forEach(p=>{
    const v=p.dataset.vipFilter;
    const lblMap={Semua:"Semua",VVIP:"VVIP",VIP:"VIP",Biasa:"Umum"};
    const icMap={Semua:"ti-users",VVIP:"ti-crown",VIP:"ti-star",Biasa:"ti-user"};
    if(lblMap[v])p.innerHTML=`<i class="ti ${icMap[v]}" style="font-size:13px"></i>${lblMap[v]}<span style="font-size:10px;opacity:.7;margin-left:2px">(${countVip(v)})</span>`;
    const isActive=v===vipF;
    p.classList.toggle("active",isActive);
    p.style.cssText="display:flex;align-items:center;gap:5px;flex:1;justify-content:center;min-width:72px"+(isActive&&v==="VVIP"?";background:linear-gradient(135deg,var(--rose),var(--rose-dark));border-color:var(--rose-dark);color:#fff":isActive&&v==="VIP"?";background:var(--amber-bg);border-color:var(--amber);color:var(--amber)":"");
  });
}

function pgAnggaran(){
  const t=totals();const allIn=S.income+t.xIn;
  const txs=S.transactions.filter(tx=>S.budFilter==="semua"||(S.budFilter==="pemasukan"&&tx.type==="in")||(S.budFilter==="pengeluaran"&&(tx.type==="out"||tx.type==="pay")));
  const groups={};txs.forEach(tx=>{const k=tx.date.substring(0,7);if(!groups[k]){const d=new Date(tx.date+"T00:00:00");groups[k]={label:d.toLocaleDateString("id-ID",{month:"long",year:"numeric"}).toUpperCase(),items:[]};}groups[k].items.push(tx);});
  const sorted=Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(k=>groups[k]);
  return `<div style="padding:18px 20px 0"><div class="section-head" style="margin-bottom:4px">${L("ledger")}</div><div style="font-size:13px;color:var(--gray);margin-bottom:14px">${L("ledgerSub")}</div></div>
  <div class="grad-card"><div style="font-size:10px;font-weight:600;color:var(--rose-mid);letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px">${L("totalBalance")}</div><div style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--rose-dark)">${fmt(allIn-t.out)}</div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 14px 14px">
    <div class="card-sm" style="margin:0"><div style="font-size:10px;font-weight:600;color:var(--teal);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:4px"><i class="ti ti-arrow-down" style="font-size:13px"></i>${L("totalIncome")}</div><div style="font-size:13.5px;font-weight:700">${fmt(allIn)}</div></div>
    <div class="card-sm" style="margin:0"><div style="font-size:10px;font-weight:600;color:var(--rose);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:4px"><i class="ti ti-arrow-up" style="font-size:13px"></i>${L("totalExpense")}</div><div style="font-size:13.5px;font-weight:700">${fmt(t.out)}</div></div>
  </div>
  <div class="pill-row">${[["semua",L("allFilter")],["pemasukan",L("incomeFilter")],["pengeluaran",L("expenseFilter")]].map(([v,lbl])=>`<span class="pill${S.budFilter===v?" active":""}" data-bud-filter="${v}">${lbl}</span>`).join("")}</div>
  ${sorted.map(g=>`<div style="font-size:10.5px;font-weight:600;color:var(--gray);letter-spacing:.8px;padding:0 18px 8px;text-transform:uppercase">${g.label}</div>
  <div class="card">${g.items.map((tx,i)=>{
    const isPayType=tx.type==="pay";
    const payStClr=tx.payStatus==="Lunas"?"var(--success)":tx.payStatus==="Sebagian"?"var(--teal)":"var(--amber)";
    const payStBg=tx.payStatus==="Lunas"?"var(--success-bg)":tx.payStatus==="Sebagian"?"var(--teal-light)":"var(--amber-bg)";
    const payStIc=tx.payStatus==="Lunas"?"ti-circle-check":tx.payStatus==="Sebagian"?"ti-chart-pie-2":"ti-circle-half-2";
    return`<div class="tx-row" style="${i===g.items.length-1?"border-bottom:none;padding-bottom:0;margin-bottom:0":""}">
    <div class="tx-icon" style="background:${isPayType?"var(--teal-light)":"var(--gray-light)"}"><i class="ti ${isPayType?"ti-cash":catIcon(tx.cat)}" style="color:${isPayType?"var(--teal)":"var(--gray)"}"></i></div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tx.name}</div>
      <div style="font-size:11.5px;color:var(--gray);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap">
        ${tx.cat}
        ${isPayType&&tx.payStatus?`<span style="display:inline-flex;align-items:center;gap:3px;background:${payStBg};color:${payStClr};padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700"><i class="ti ${payStIc}" style="font-size:9px"></i>${tx.payStatus}</span>`:""}
        ${!isPayType&&tx.status?`<span class="badge ${sCls(tx.status)}"><i class="ti ${sIcon(tx.status)}" style="font-size:10px"></i> ${tx.status}</span>`:""}
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <div style="font-weight:700;font-size:13px;color:${tx.type==="in"?"var(--teal)":isPayType?"var(--rose-mid)":"var(--dark)"};white-space:nowrap">${tx.type==="in"?"+":"-"}${fmt(tx.amount)}</div>
      <button class="edit-btn" data-edit-tx="${tx.id}"><i class="ti ti-pencil" style="font-size:13px"></i></button>
    </div>
  </div>`;}).join("")}</div>`).join("")}
  <button class="fab" id="fab-tx"><i class="ti ti-plus" style="font-size:22px"></i></button>`;
}

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="section-head" style="margin-bottom:0">${isSouv?"Souvenir":L("seserahanTitle")}</div>

      <button id="btn-ses-tab" style="flex:1;border:none;border-radius:11px;padding:9px 0;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;background:${!isSouv?"var(--white)":"transparent"};color:${!isSouv?"var(--dark)":"var(--gray)"};box-shadow:${!isSouv?"0 1px 4px rgba(0,0,0,.09)":"none"};display:flex;align-items:center;justify-content:center;gap:6px"><i class="ti ti-gift" style="font-size:15px"></i>Seserahan</button>
      <button id="btn-souvenir-tab" style="flex:1;border:none;border-radius:11px;padding:9px 0;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;background:${isSouv?"var(--white)":"transparent"};color:${isSouv?"var(--amber)":"var(--gray)"};box-shadow:${isSouv?"0 1px 4px rgba(0,0,0,.09)":"none"};display:flex;align-items:center;justify-content:center;gap:6px"><i class="ti ti-box-seam" style="font-size:15px"></i>Souvenir</button>

function pgSeserahanContent(){
  const t=totals();const pct=Math.round(t.sesDone/Math.max(S.seserahan.length,1)*100);
  const items=S.seserahan.filter(i=>S.sesFilter==="Semua"||(S.sesFilter==="Pria"&&i.party==="Pria")||(S.sesFilter==="Wanita"&&i.party==="Wanita")||(S.sesFilter==="Mahar"&&i.party==="Mahar"));
  return `<div style="padding:0 18px 0"><div style="font-size:13px;color:var(--gray);margin-bottom:12px">${L("seserahanSub")}</div></div>
  <div class="card"><div style="font-size:10px;font-weight:600;color:var(--gray);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px">${L("overallProgress")}</div><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-weight:600;font-size:14px">${t.sesDone} / ${S.seserahan.length} ${L("itemsReady")}</span><span style="font-size:13px;color:var(--gray)">${pct}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
  <div class="grad-card"><div style="font-size:10px;font-weight:600;color:var(--rose-mid);letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px">${L("estimatedCost")}</div><div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--rose-dark);margin-top:2px">${fmt(t.sesCost)}</div><div style="font-size:12.5px;color:var(--teal);margin-top:5px;display:flex;align-items:center;gap:4px"><i class="ti ti-circle-check" style="font-size:14px"></i>${L("withinBudget")}</div></div>
  <div class="pill-row">${[[L("allParty"),"Semua"],[L("male"),"Pria"],[L("female"),"Wanita"],[L("dowry"),"Mahar"]].map(([lbl,v])=>`<span class="pill${S.sesFilter===v?" active":""}" data-ses-filter="${v}">${lbl}</span>`).join("")}</div>
  ${items.map(item=>{const refId="ses_"+item.id;const paid=getPaidAmount(refId);const warn=getBudgetWarning(item.price,paid);const pct=item.price>0?Math.min(100,Math.round(paid/item.price*100)):0;return`<div class="card"><div style="display:flex;gap:12px"><div style="width:48px;height:48px;border-radius:13px;background:var(--gray-light);display:flex;align-items:center;justify-content:center;color:var(--gray);flex-shrink:0"><i class="ti ${catIcon(item.cat)}" style="font-size:22px"></i></div><div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px"><div style="font-weight:600;font-size:14px">${item.name}</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0"><span class="badge ${sCls(item.status)}"><i class="ti ${sIcon(item.status)}" style="font-size:10px"></i> ${item.status}</span><button class="edit-btn" data-edit-ses="${item.id}" onclick="event.stopPropagation()"><i class="ti ti-pencil" style="font-size:13px"></i></button></div></div><div style="font-size:12px;color:var(--gray);margin-top:2px">${item.cat} &middot; ${item.party==="Mahar"?item.party:"Untuk "+item.party}</div>${item.link?`<div style="margin-top:6px"><a href="${item.link}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--rose-dark);text-decoration:none;background:var(--pink-bg);padding:4px 10px;border-radius:20px;border:1px solid var(--rose-light)"><i class="ti ti-shopping-bag" style="font-size:12px"></i>Beli di Toko</a></div>`:""}
<div data-pay-history="${refId}" data-pay-label="${item.name.replace(/"/g,'&quot;')}" data-pay-budget="${item.price}" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border-light);cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:11px;color:var(--gray)">Anggaran: <span style="font-weight:700;color:var(--dark)">${fmt(item.price)}</span></span><span class="badge ${warn.cls}" style="font-size:10px"><i class="ti ${warn.ic}" style="font-size:9px"></i> ${warn.label}</span></div><div class="progress-bar" style="height:4px;margin-bottom:4px"><div class="progress-fill" style="width:${pct}%;background:${warn.label==="Overbudget"?"var(--danger)":warn.label==="Cukup"?"var(--amber)":"var(--teal)"}"></div></div><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;color:var(--gray);display:flex;align-items:center;gap:4px">Terpakai: <span style="font-weight:600;color:var(--dark)">${fmt(paid)}</span><i class="ti ti-receipt" style="font-size:12px;color:var(--teal)"></i></span></div></div></div></div></div>`;}).join("")}
  <button class="fab" id="fab-ses"><i class="ti ti-plus" style="font-size:22px"></i></button>`;
}

function pgSouvenirContent(){
  const t=totals();const souv=S.souvenir||[];
  const pct=Math.round(t.souvDone/Math.max(souv.length,1)*100);
  const totalQty=souv.reduce((a,i)=>a+(i.qty||1),0);

  <div class="card"><div style="font-size:10px;font-weight:600;color:var(--gray);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px">${L("overallProgress")}</div><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-weight:600;font-size:14px">${t.souvDone} / ${souv.length} ${L("itemsReady")} &middot; ${totalQty} pcs</span><span style="font-size:13px;color:var(--gray)">${pct}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
  <div class="grad-card"><div style="font-size:10px;font-weight:600;color:var(--rose-mid);letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px">${L("estimatedCost")}</div><div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--rose-dark);margin-top:2px">${fmt(t.souvCost)}</div></div>
  ${souv.map(item=>{const total=(item.qty||1)*item.price;const refId="souv_"+item.id;const paid=getPaidAmount(refId);const warn=getBudgetWarning(total,paid);const pct=total>0?Math.min(100,Math.round(paid/total*100)):0;return`<div class="card"><div style="display:flex;gap:12px"><div style="width:48px;height:48px;border-radius:13px;background:var(--amber-bg);display:flex;align-items:center;justify-content:center;color:var(--amber);flex-shrink:0"><i class="ti ti-box-seam" style="font-size:22px"></i></div><div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px"><div style="font-weight:600;font-size:14px">${item.name}</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0"><span class="badge ${sCls(item.status)}"><i class="ti ${sIcon(item.status)}" style="font-size:10px"></i> ${item.status}</span><button class="edit-btn" data-edit-souvenir="${item.id}" onclick="event.stopPropagation()"><i class="ti ti-pencil" style="font-size:13px"></i></button></div></div><div style="font-size:12px;color:var(--gray);margin-top:2px">${item.qty||1} pcs &middot; ${fmt(item.price)}/pcs</div>${item.link?`<div style="margin-top:6px"><a href="${item.link}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--amber);text-decoration:none;background:var(--amber-bg);padding:4px 10px;border-radius:20px;border:1px solid var(--amber)"><i class="ti ti-shopping-bag" style="font-size:12px"></i>Beli di Toko</a></div>`:""}
<div data-pay-history="${refId}" data-pay-label="${item.name.replace(/"/g,'&quot;')}" data-pay-budget="${total}" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border-light);cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:11px;color:var(--gray)">Total: <span style="font-weight:700;color:var(--dark)">${fmt(total)}</span></span><span class="badge ${warn.cls}" style="font-size:10px"><i class="ti ${warn.ic}" style="font-size:9px"></i> ${warn.label}</span></div><div class="progress-bar" style="height:4px;margin-bottom:4px"><div class="progress-fill" style="width:${pct}%;background:${warn.label==="Overbudget"?"var(--danger)":warn.label==="Cukup"?"var(--amber)":"var(--teal)"}"></div></div><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;color:var(--gray);display:flex;align-items:center;gap:4px">Terpakai: <span style="font-weight:600;color:var(--dark)">${fmt(paid)}</span><i class="ti ti-receipt" style="font-size:12px;color:var(--teal)"></i></span></div></div></div></div></div>`;}).join("")}
  <button class="fab" id="fab-souvenir"><i class="ti ti-plus" style="font-size:22px"></i></button>`;
}

function guestCard(g){
  const vl=g.vipLevel||(g.vip?"VIP":"Biasa");
  const vipBadge=vl==="VVIP"
    ?`<span style="font-size:10.5px;font-weight:700;background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:#fff;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:3px"><i class="ti ti-crown" style="font-size:10px"></i>VVIP</span>`
    :vl==="VIP"
    ?`<span style="font-size:10.5px;font-weight:700;background:var(--amber-bg);color:var(--amber);padding:3px 10px;border-radius:20px">VIP</span>`
    :"";
  const hasPhone=(g.contact||"").replace(/\D/g,"").length>=8;
  const sentCount=g.sentCount||0;
  const sentIcon=sentCount>0?'<i class="ti ti-circle-check" style="font-size:10px"></i>':'<i class="ti ti-send" style="font-size:10px;opacity:.4"></i>';
  const sentColor=sentCount>0?"#128C7E":"var(--gray)";
  const sentWeight=sentCount>0?"600":"400";
  return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:stretch"><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14.5px;margin-bottom:4px">${g.name}</div><div style="font-size:12.5px;color:var(--gray);margin-bottom:9px;display:flex;align-items:center;gap:5px"><i class="ti ${g.count>1?"ti-users":"ti-user"}" style="font-size:14px"></i>${g.count}</div><div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center"><span style="font-size:10.5px;font-weight:600;background:var(--gray-light);color:var(--gray);padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px">${g.group}</span>${vipBadge}<span class="badge ${sCls(g.rsvp)}"><i class="ti ${rsvpIcon(g.rsvp)}" style="font-size:10px"></i> ${g.rsvp}</span></div></div><div style="display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;margin-left:8px;flex-shrink:0"><div style="display:flex;gap:6px;align-items:center"><button class="edit-btn" data-preview-guest="${g.id}" title="Preview Pesan" style="background:var(--white);border-color:var(--border);color:var(--gray)"><i class="ti ti-eye" style="font-size:13px"></i></button><button class="edit-btn" data-wa-guest="${g.id}" title="${hasPhone?"Kirim Undangan WA":"Nomor WA belum diisi"}" style="background:${hasPhone?"#e8fdf0":"var(--white)"};border-color:${hasPhone?"#25D366":"var(--border)"};color:${hasPhone?"#128C7E":"var(--gray)"}"><i class="ti ti-brand-whatsapp" style="font-size:13px"></i></button><button class="edit-btn" data-edit-guest="${g.id}"><i class="ti ti-pencil" style="font-size:13px"></i></button></div><div style="font-size:10.5px;color:${sentColor};font-weight:${sentWeight};display:flex;align-items:center;gap:3px">${sentIcon}Terkirim: ${sentCount}x</div></div></div></div>`;
}

function brismedPersonCard(b){
  return `<div class="card" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14.5px;margin-bottom:4px">${b.name}</div><div style="font-size:12.5px;color:var(--gray);margin-bottom:7px;display:flex;align-items:center;gap:5px"><i class="ti ${b.count>1?"ti-users":"ti-user"}" style="font-size:14px"></i>${b.count} orang</div><div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center"><span style="font-size:10.5px;font-weight:600;background:var(--gray-light);color:var(--gray);padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px">${b.group}</span>${b.vip?"<span style=\"font-size:10.5px;font-weight:700;background:var(--amber-bg);color:var(--amber);padding:3px 10px;border-radius:20px\">VIP</span>":""}<span class="badge ${sCls(b.rsvp)}"><i class="ti ${rsvpIcon(b.rsvp)}" style="font-size:10px"></i> ${b.rsvp}</span></div></div><button class="edit-btn" data-edit-brm-person="${b.id}" style="margin-top:2px"><i class="ti ti-pencil" style="font-size:13px"></i></button></div></div>`;

function brismedItemCard(b){
  const items=b.items||[];
  const done=items.filter(i=>["Siap","Sudah Dibeli","Sudah Dihias"].includes(i.status)).length;
  const total=items.length;
  const totalCost=items.reduce((a,i)=>a+i.price,0);
  return `<div class="card" style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div style="font-weight:700;font-size:14.5px">${b.name}</div><button class="edit-btn" data-edit-brm-person="${b.id}"><i class="ti ti-pencil" style="font-size:13px"></i></button></div>
  ${total>0?`<div style="margin-bottom:8px"><div class="progress-bar" style="margin-bottom:4px"><div class="progress-fill" style="width:${Math.round(done/total*100)}%"></div></div><div style="font-size:11px;color:var(--gray)">${done}/${total} item siap &middot; ${fmt(totalCost)}</div></div>`:"<div style=\"font-size:12px;color:var(--gray);margin-bottom:6px\">Belum ada perlengkapan</div>"}
  ${items.map(i=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--border-light)"><div style="width:30px;height:30px;border-radius:9px;background:var(--gray-light);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti ${catIcon(i.cat)}" style="font-size:14px;color:var(--gray)"></i></div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${i.name}</div><div style="font-size:11px;color:var(--gray)">${fmt(i.price)}</div></div><div style="display:flex;align-items:center;gap:5px"><span class="badge ${sCls(i.status)}" style="font-size:10px"><i class="ti ${sIcon(i.status)}" style="font-size:9px"></i> ${i.status}</span>${i.link?`<a href="${i.link}" target="_blank" rel="noopener" title="Buka link toko" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--pink-bg);border:1px solid var(--rose-light)"><i class="ti ti-shopping-bag" style="font-size:11px;color:var(--rose-dark)"></i></a>`:""}
  <button class="edit-btn" data-edit-brm-item="${b.id}" data-item-id="${i.id}" style="width:24px;height:24px"><i class="ti ti-pencil" style="font-size:11px"></i></button></div></div>`).join("")}
  <button style="margin-top:8px;width:100%;background:var(--pink-bg);border:1.5px dashed var(--rose-light);border-radius:10px;padding:8px;color:var(--rose-dark);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px" data-add-brm-item="${b.id}"><i class="ti ti-plus" style="font-size:13px"></i>Tambah Perlengkapan</button>
  </div>`;
}

function pgBrismedTamu(){
  const t=totals();
  const q=S.guestSearch.toLowerCase();
  const gf=S.guestFilter||"Semua";
  const gdr=S.genderFilter||"Semua";
  const vipF=S.vipFilter||"Semua";
  const filterMode=S.guestFilterMode||"gender";
  const GFILTERS=[["Semua","Semua"],["Teman Wanita","Teman Wanita"],["Teman Pria","Teman Pria"]];
  /* count per group (before secondary filter) */
  const countGF=f=>S.guests.filter(g=>f==="Semua"||g.group===f).reduce((a,g)=>a+g.count,0);
  /* count per gender within current group filter */
  const countGdr=gender=>S.guests.filter(g=>{
    const matchGroup=gf==="Semua"||g.group===gf;
    const matchGender=gender==="Semua"||(g.gender||"Pria")===gender;
    return matchGroup&&matchGender;
  }).reduce((a,g)=>a+g.count,0);
  /* count per vip level within current group filter */
  const vipLevelOf=g=>g.vipLevel||(g.vip?"VIP":"Biasa");
  const countVip=level=>S.guests.filter(g=>{
    const matchGroup=gf==="Semua"||g.group===gf;
    const matchVip=level==="Semua"||vipLevelOf(g)===level;
    return matchGroup&&matchVip;
  }).reduce((a,g)=>a+g.count,0);
  /* final filtered list */
  const filteredFinal=S.guests.filter(g=>{
    const mq=!q||g.name.toLowerCase().includes(q)||g.group.toLowerCase().includes(q);
    const mf=gf==="Semua"||g.group===gf;
    const mg=filterMode==="gender"?(gdr==="Semua"||(g.gender||"Pria")===gdr):(vipF==="Semua"||vipLevelOf(g)===vipF);
    return mq&&mf&&mg;
  });
  return `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:0 14px 13px">
    <div class="stat-card" style="background:var(--white);border:1px solid var(--border)"><div class="stat-num">${t.totalG}</div><div class="stat-lbl" style="color:var(--gray)">${L("totalGuest")}</div></div>
    <div class="stat-card" style="background:var(--teal-light)"><div class="stat-num" style="color:var(--teal)">${t.hadir}</div><div class="stat-lbl" style="color:var(--teal)">${L("present")}</div></div>
    <div class="stat-card" style="background:var(--pink-bg)"><div class="stat-num" style="color:var(--rose)">${t.tunggu}</div><div class="stat-lbl" style="color:var(--rose)">${L("waiting")}</div></div>
  </div>
  <div style="margin:0 14px 12px"><div class="card-sm" style="display:flex;align-items:center;gap:9px"><i class="ti ti-search" style="font-size:17px;color:var(--gray);flex-shrink:0"></i><input id="guest-search-inp" style="border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13.5px;width:100%;color:var(--dark)" placeholder="${L("searchGuestPh")}" value="${S.guestSearch}"></div></div>
  <div class="pill-row" style="padding:0 14px 8px">${GFILTERS.map(([v,lbl])=>`<span class="pill gf-pill${gf===v?" active":""}" data-guest-filter="${v}">${lbl}<span style="font-size:10px;opacity:.7;margin-left:4px">(${countGF(v)})</span></span>`).join("")}</div>
  <div style="padding:0 14px 12px;border-bottom:1px solid var(--border-light);margin-bottom:4px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
      <div style="position:relative;flex-shrink:0">
        <select id="guest-filter-mode-select" style="appearance:none;-webkit-appearance:none;border:1.5px solid var(--border);background:var(--white);border-radius:10px;padding:7px 28px 7px 11px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;color:var(--dark);letter-spacing:.4px;text-transform:uppercase;cursor:pointer;outline:none">
          <option value="gender"${filterMode==="gender"?" selected":""}>FILTER GENDER</option>
          <option value="vip"${filterMode==="vip"?" selected":""}>FILTER VIP/NAMA</option>
        </select>
        <i class="ti ti-chevron-down" style="position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--gray);pointer-events:none"></i>
      </div>
    </div>
    ${filterMode==="gender"
      ?`<div style="display:flex;gap:8px">
        ${[["Semua","Semua","ti-users"],["Pria","Pria","ti-man"],["Wanita","Wanita","ti-woman"]].map(([v,lbl,ic])=>`<span class="pill gdr-pill${gdr===v?" active":""}" data-gender-filter="${v}" style="display:flex;align-items:center;gap:5px;flex:1;justify-content:center"><i class="ti ${ic}" style="font-size:13px"></i>${lbl}<span style="font-size:10px;opacity:.7;margin-left:2px">(${countGdr(v)})</span></span>`).join("")}
      </div>`
      :`<div style="display:flex;gap:8px;flex-wrap:wrap">
        ${[["Semua","Semua","ti-users"],["VVIP","VVIP","ti-crown"],["VIP","VIP","ti-star"],["Biasa","Umum","ti-user"]].map(([v,lbl,ic])=>`<span class="pill vip-pill${vipF===v?" active":""}" data-vip-filter="${v}" style="display:flex;align-items:center;gap:5px;flex:1;justify-content:center;min-width:72px${vipF===v&&v==="VVIP"?";background:linear-gradient(135deg,var(--rose),var(--rose-dark));border-color:var(--rose-dark);color:#fff":vipF===v&&v==="VIP"?";background:var(--amber-bg);border-color:var(--amber);color:var(--amber)":""}"><i class="ti ${ic}" style="font-size:13px"></i>${lbl}<span style="font-size:10px;opacity:.7;margin-left:2px">(${countVip(v)})</span></span>`).join("")}
      </div>`
    }
  </div>
  <div id="guest-list">${filteredFinal.map(guestCard).join("")}</div>
  <button class="fab" id="fab-guest"><i class="ti ti-user-plus" style="font-size:22px"></i></button>`;
}

function pgBrismedPage(){

  </div>

      :sharedList.map(item=>{

<div data-pay-history="${refId}" data-pay-label="${item.name.replace(/"/g,'&quot;')}" data-pay-budget="${item.price||0}" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border-light);cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:11px;color:var(--gray)">Anggaran: <span style="font-weight:700;color:var(--dark)">${fmt(item.price||0)}</span></span><span class="badge ${warn.cls}" style="font-size:10px"><i class="ti ${warn.ic}" style="font-size:9px"></i> ${warn.label}</span></div><div class="progress-bar" style="height:4px;margin-bottom:4px"><div class="progress-fill" style="width:${pct2}%;background:${warn.label==="Overbudget"?"var(--danger)":warn.label==="Cukup"?"var(--amber)":"var(--teal)"}"></div></div><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;color:var(--gray);display:flex;align-items:center;gap:4px">Terpakai: <span style="font-weight:600;color:var(--dark)">${fmt(paid)}</span><i class="ti ti-receipt" style="font-size:12px;color:var(--teal)"></i></span></div></div></div></div></div>`;
      }).join("") )}
  ${brmSubTab==="nama"
    ?`<button class="fab" id="fab-bridesmaid"><i class="ti ti-user-plus" style="font-size:22px"></i></button>`
    :`<button class="fab" id="fab-brismed-ses"><i class="ti ti-package" style="font-size:22px"></i></button>`

function openModal(type,id,brmId){
  const ov=document.getElementById("modal-overlay");
  const mc=document.getElementById("modal-content");
  ov.classList.add("open");
  if(type==="brismed-item"){
    mc.innerHTML="<div class=\"modal-handle\"></div>"+buildBrismedItemForm(brmId||id,brmId?id:null);
    mc.dataset.brmId=brmId||id;
    mc.dataset.itemId=brmId?id:"";
  } else {
    const builders={tx:buildTxForm,ses:buildSesForm,souvenir:buildSouvenirForm,guest:buildGuestForm,doc:buildDocForm,pers:buildPersForm,vendor:buildVendorForm,brismed:buildBrismedForm,"brismed-ses":buildBrismedSeserahanForm};
    mc.innerHTML="<div class=\"modal-handle\"></div>"+(builders[type]?builders[type](id):"");
  }
  setTimeout(()=>{
    ["m-tx-amt","m-ses-price","m-souv-price","m-v-cost","m-brmi-price","m-brms-price","m-pers-price"].forEach(eid=>bindMoney(eid));
    bindModalEvents(type,id,brmId);
  },30);
}
function closeModal(){document.getElementById("modal-overlay").classList.remove("open");}

    else if(t==="vendor")saveVendor(id);
    else if(t==="brismed")saveBrismed(id);

function delBrismedItem(brmId,itemId){
  if(!confirm("Hapus perlengkapan ini?"))return;
  const brm=S.brismed.find(x=>String(x.id)===String(brmId));
  if(brm&&brm.items)brm.items=brm.items.filter(i=>String(i.id)!==String(itemId));
  syncBrismedBudget();
  closeModal();renderPage("tamu");showToast(L("itemDeleted"));addNotif("Perlengkapan dihapus","ti-trash");
}

function delItem(type,id){
  if(!confirm(L("itemDeleted")+"?"))return;
  const map={tx:"transactions",ses:"seserahan",souvenir:"souvenir",guest:"guests",doc:"documents",pers:"persiapan",vendor:"vendors",brismed:"brismed","brismed-shared-item":"brismedItems"};
  if(map[type])S[map[type]]=S[map[type]].filter(x=>String(x.id)!==String(id));
  if(type==="brismed"){syncBrismedBudget();}
  closeModal();renderPage(curTab);showToast(L("itemDeleted"));addNotif("Item berhasil dihapus","ti-trash");
}

function openPaymentHistory(refId,itemLabel,budget){
  if(document.getElementById("pay-history-overlay"))document.getElementById("pay-history-overlay").remove();
  const payments=S.transactions.filter(tx=>tx.type==="pay"&&tx.payRefId===refId).sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
  const totalPaid=payments.reduce((a,t)=>a+t.amount,0);
  const warn=getBudgetWarning(budget||0,totalPaid);

  const sheet=document.createElement("div");sheet.className="cat-picker-sheet";

  const ttl=document.createElement("div");
  ttl.innerHTML=`<div style="font-size:10px;font-weight:700;color:var(--teal);letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:6px"><i class="ti ti-history" style="font-size:14px"></i>RIWAYAT PEMBAYARAN</div><div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--dark);margin-top:2px">${itemLabel}</div>`;
  const xBtn=document.createElement("button");xBtn.className="hicon";xBtn.innerHTML="<i class=\"ti ti-x\"></i>";xBtn.onclick=()=>overlay.remove();

  summary.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:10px;font-weight:600;color:var(--rose-mid);letter-spacing:.5px;text-transform:uppercase">Anggaran</span><span style="font-weight:700;font-size:15px;color:var(--rose-dark)">${fmt(budget||0)}</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:10px;font-weight:600;color:var(--teal);letter-spacing:.5px;text-transform:uppercase">Terbayar</span><span style="font-weight:700;font-size:15px;color:var(--teal-dark)">${fmt(totalPaid)}</span></div>
    <div class="progress-bar" style="height:6px;margin-bottom:6px"><div class="progress-fill" style="width:${pct}%;background:${warn.label==="Overbudget"?"var(--danger)":warn.label==="Cukup"?"var(--amber)":"var(--teal)"}"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center"><span class="badge ${warn.cls}" style="font-size:10.5px"><i class="ti ${warn.ic}" style="font-size:10px"></i> ${warn.label}</span><span style="font-size:11.5px;color:var(--gray)">${pct}% terpakai</span></div>`;

  const listWrap=document.createElement("div");
  if(payments.length===0){

        const payStClr=tx.payStatus==="Lunas"?"var(--success)":tx.payStatus==="Sebagian"?"var(--teal)":"var(--amber)";
        const payStBg=tx.payStatus==="Lunas"?"var(--success-bg)":tx.payStatus==="Sebagian"?"var(--teal-light)":"var(--amber-bg)";
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-light)">

  closeBar.onclick=()=>overlay.remove();

  sheet.appendChild(hdr);sheet.appendChild(summary);sheet.appendChild(listWrap);sheet.appendChild(closeBar);
  overlay.appendChild(sheet);overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
}

function openCatPicker(currentCat,cb,filteredCats){
  const catList=filteredCats||CATS;
  pickerSel=currentCat||"";pickerCb=cb;
  if(document.getElementById("cat-picker"))document.getElementById("cat-picker").remove();
  const overlay=document.createElement("div");overlay.className="cat-picker-overlay";overlay.id="cat-picker";
  const sheet=document.createElement("div");sheet.className="cat-picker-sheet";

  const hdr=document.createElement("div");hdr.style.cssText="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px";
  const ttl=document.createElement("div");
  const isIncome=filteredCats===CATS_INCOME;
  const titleLabel=isIncome?"Pilih Sumber Pemasukan":L("pickCategory");
  const subLabel=isIncome?"Semua sumber dana pernikahan Anda":L("pickCategorySub");
  ttl.innerHTML="<div style=\"font-size:10px;font-weight:700;color:var(--teal);letter-spacing:.8px;text-transform:uppercase;display:flex;align-items:center;gap:6px\"><i class=\"ti "+(isIncome?"ti-arrow-down-circle":"ti-layout-grid-add")+"\" style=\"font-size:14px\"></i>"+(isIncome?"PEMASUKAN":L("pickCategory"))+"</div><div style=\"font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--dark);margin-top:2px\">"+titleLabel+"</div><div style=\"font-size:12.5px;color:var(--gray);margin-top:2px\">"+subLabel+"</div>";
  const xBtn=document.createElement("button");xBtn.className="hicon";xBtn.innerHTML="<i class=\"ti ti-x\"></i>";xBtn.onclick=()=>overlay.remove();
  hdr.appendChild(ttl);hdr.appendChild(xBtn);

  const grid=document.createElement("div");grid.className="cat-grid"+(isIncome?" cat-grid-income":"");
  const lbl=document.createElement("div");lbl.style.cssText="text-align:center;font-size:10.5px;color:var(--gray);letter-spacing:.5px;text-transform:uppercase;margin-top:8px";lbl.textContent=pickerSel?pickerSel.toUpperCase():L("noneSelected");

  catList.forEach(c=>{
    const card=document.createElement("div");card.className="cat-card"+(pickerSel===c.id?" selected":"");
    if(isIncome)card.style.cssText="flex-direction:row;align-items:center;gap:14px;padding:16px;";
    card.innerHTML="<div class=\"cat-icon-wrap\" style=\"background:"+c.bg+"\"><i class=\"ti "+c.icon+"\" style=\"color:"+c.ic+"\"></i></div><div><div class=\"cat-name\">"+c.name+"</div><div class=\"cat-sub\" style=\"font-size:11px;color:var(--gray);font-weight:500\">"+c.sub+"</div></div>";
    card.onclick=()=>{pickerSel=c.id;grid.querySelectorAll(".cat-card").forEach(x=>x.classList.remove("selected"));card.classList.add("selected");lbl.textContent=c.id.toUpperCase();};
    grid.appendChild(card);
  });

  const bar=document.createElement("div");bar.className="cat-confirm-bar";
  const confirmBtn=document.createElement("button");confirmBtn.className="cat-confirm-btn";
  confirmBtn.innerHTML="<i class=\"ti ti-circle-check\" style=\"font-size:17px\"></i>"+L("confirmPick")+" &rarr;";
  confirmBtn.onclick=()=>{if(!pickerSel){showToast(L("pickCatFirst"));return;}if(pickerCb)pickerCb(pickerSel);overlay.remove();};
  bar.appendChild(confirmBtn);bar.appendChild(lbl);

  sheet.appendChild(hdr);sheet.appendChild(grid);sheet.appendChild(bar);
  overlay.appendChild(sheet);overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
}

function saveTx(id){
  if(txType==="pay"){
    const amt=moneyVal("m-tx-amt");
    const refId=(document.getElementById("pay-ref-id")||{}).value||"";
    const notes=(document.getElementById("m-tx-notes")||{}).value||"";
    const payStatus=(document.getElementById("pay-stat-hid")||{}).value||"DP";
    if(!amt){showToast(L("fillRequired"));return;}
    if(!refId){showToast("Pilih item yang dibayar");return;}
    const budItems=getBudgetItems();
    const selItem=budItems.find(b=>b.id===refId);
    const itemName=selItem?selItem.label:"Pembayaran";
    const cat=selItem?({Vendor:"Vendor",Seserahan:"Seserahan",Souvenir:"Souvenir",Perlengkapan:"Bridesmaid",Persiapan:"Lain-Lain"}[selItem.type]||"Lain-Lain"):"Lain-Lain";
    if(id){const tx=S.transactions.find(x=>String(x.id)===String(id));if(tx)Object.assign(tx,{name:"Bayar: "+itemName,cat,type:"pay",amount:amt,status:payStatus,payStatus,notes,payRefId:refId,date:tx.date});showToast("Pembayaran diperbarui");}
    else{S.transactions.unshift({id:Date.now(),name:"Bayar: "+itemName,cat,type:"pay",amount:amt,status:payStatus,payStatus,notes,payRefId:refId,date:new Date().toISOString().split("T")[0]});showToast("Pembayaran dicatat");addNotif("Pembayaran baru dicatat ("+payStatus+")","ti-cash");}
    txPaySel=null;closeModal();renderPage("anggaran");return;
  }
  const name=(document.getElementById("m-tx-name").value||"").trim();
  const amt=moneyVal("m-tx-amt");
  if(!name||!amt){showToast(L("fillRequired"));return;}
  const cat=(document.getElementById("cat-hid-tx")||{}).value||"Lain-Lain";
  const notes=(document.getElementById("m-tx-notes").value||"");
  if(id){const tx=S.transactions.find(x=>String(x.id)===String(id));if(tx)Object.assign(tx,{name,cat,type:txType,amount:amt,status:txStatus,notes});showToast(L("budgetUpdated"));addNotif("Transaksi berhasil diperbarui","ti-report-money");}
  else{S.transactions.unshift({id:Date.now(),name,cat,type:txType,amount:amt,status:txStatus,notes,date:new Date().toISOString().split("T")[0]});showToast(L("budgetAdded"));addNotif("Transaksi baru ditambahkan","ti-report-money");}
  closeModal();renderPage("anggaran");
}

/* Sync brismed item budgets to S.brismedItems aggregate */
function syncBrismedBudget(){
  const allItems={};
  S.brismed.forEach(b=>(b.items||[]).forEach(i=>{
    if(!allItems[i.name])allItems[i.name]={id:i.id,name:i.name,cat:i.cat,price:i.price,status:i.status,link:i.link||""};
    else if(i.price>allItems[i.name].price)allItems[i.name].price=i.price;
  }));
  S.brismedItems=(S.brismedItems||[]).filter(existing=>!allItems[existing.name]);
  Object.values(allItems).forEach(item=>{S.brismedItems.push(item);});
}

/* ── PROFILE SUBPAGES ── */
function openSub(sub){
  const sp=document.getElementById("subpage-container");
  sp.classList.add("open");
  const pages={main:subMain,detail:subDetail,security:subSecurity,notif:subNotif,bantuan:subBantuan,theme:subTheme};
  sp.innerHTML=pages[sub]?pages[sub]():"";
  initSubEvents(sub);
}
function closeSub(){document.getElementById("subpage-container").classList.remove("open");}

function initSubEvents(sub){
  const sp=document.getElementById("subpage-container");
  sp.querySelectorAll("[data-sub]").forEach(el=>el.onclick=()=>openSub(el.dataset.sub));
  sp.querySelectorAll("[data-sub-back]").forEach(b=>b.onclick=()=>openSub(b.dataset.subBack||"main"));
  const lo=sp.querySelector("#sub-logout");if(lo)lo.onclick=closeSub;
  if(sub==="main"){
    const dm=sp.querySelector("#dm-toggle");
    if(dm)dm.onclick=function(){S.darkMode=!S.darkMode;this.style.background=S.darkMode?"var(--teal)":"var(--border)";this.querySelector(".knob").style.left=S.darkMode?"23px":"3px";applyDark();showToast(S.darkMode?L("darkOn"):L("darkOff"));};
    const pp=sp.querySelector("#profile-photo-btn");
    if(pp)pp.onclick=()=>pickPhoto(d=>{S.profilePhoto=d;openSub("main");showToast(L("photoSaved"));});
    const lb=sp.querySelector("#lang-btn");if(lb)lb.onclick=openLangPicker;
  }
  if(sub==="detail"){
    const cb=sp.querySelector("#cover-photo-btn");
    if(cb)cb.onclick=()=>pickPhoto(d=>{
      S.coverPhoto=d;
      /* Update preview di subDetail */
      const prev=sp.querySelector("#cover-photo-preview");
      if(prev){
        prev.innerHTML="";
        const img=document.createElement("img");img.src=d;img.style.cssText="width:100%;height:100%;object-fit:cover;border-radius:14px";prev.appendChild(img);
        const ov2=document.createElement("div");ov2.className="photo-overlay";ov2.textContent=L("changeCover");prev.appendChild(ov2);
      }
      /* Langsung sync cover ke Firestore */
      syncSettings();
    });
    sp.querySelectorAll("[data-theme]").forEach(p=>p.onclick=()=>{selTheme=p.dataset.theme;sp.querySelectorAll("[data-theme]").forEach(x=>x.classList.toggle("active",x===p));});
    const sv=sp.querySelector("#save-detail-btn");if(sv)sv.onclick=saveDetail;
  }
  if(sub==="security"){
    const dm2=sp.querySelector(".toggle-sw");
    if(dm2)dm2.onclick=function(){const on=this.style.background.includes("teal");this.style.background=on?"var(--border)":"var(--teal)";this.querySelector(".knob").style.left=on?"3px":"23px";showToast(on?L("twoFAOff"):L("twoFAOn"));};
    const sp2=sp.querySelector("#save-pass-btn");
    if(sp2)sp2.onclick=async function(){
      const curInp=sp.querySelector("#pass-current");
      const newInp=sp.querySelector("#pass-new");
      const cfmInp=sp.querySelector("#pass-confirm");
      const cur=(curInp.value||"").trim();
      const nw=(newInp.value||"").trim();
      const cfm=(cfmInp.value||"").trim();
      if(!cur||!nw||!cfm){showToast("Semua field wajib diisi");return;}
      if(nw.length<6){showToast("Kata sandi baru minimal 6 karakter");return;}
      if(nw!==cfm){showToast("Konfirmasi kata sandi tidak cocok");return;}
      if(!_fbReady||!_auth||!_auth.currentUser){showToast("Tidak terhubung ke akun");return;}
      sp2.textContent="Menyimpan...";sp2.disabled=true;
      try{
        /* Re-authenticate dulu dengan kata sandi lama */
        const cred=_AU.credential(_auth.currentUser.email,cur);
        await _AU.reauthenticate(_auth.currentUser,cred);
        /* Update password */
        await _AU.updatePassword(_auth.currentUser,nw);
        /* Kosongkan form */
        curInp.value="";newInp.value="";cfmInp.value="";
        /* Reset eye icons ke password mode */
        sp.querySelectorAll(".pass-eye-btn").forEach(btn=>{
          const target=sp.querySelector("#"+btn.dataset.target);
          if(target)target.type="password";
          btn.innerHTML='<i class="ti ti-eye" style="font-size:16px"></i>';
          btn.style.color="var(--gray)";
        });
        showToast(L("passUpdated"));
      }catch(e){
        const ERR={"auth/wrong-password":"Kata sandi saat ini salah","auth/invalid-credential":"Kata sandi saat ini salah","auth/too-many-requests":"Terlalu banyak percobaan, coba lagi nanti","auth/weak-password":"Kata sandi baru terlalu lemah"};
        showToast(ERR[e.code]||("Gagal: "+e.message));
      }finally{sp2.textContent=L("saveChanges");sp2.disabled=false;}
    };
    sp.querySelectorAll("[data-logout-dev]").forEach(b=>b.onclick=()=>showToast(L("deviceLogout")));
    sp.querySelectorAll(".pass-eye-btn").forEach(btn=>{
      btn.onclick=function(){
        const inp=sp.querySelector("#"+this.dataset.target);
        if(!inp)return;
        const show=inp.type==="password";
        inp.type=show?"text":"password";
        this.innerHTML=show?"<i class=\"ti ti-eye-off\" style=\"font-size:16px\"></i>":"<i class=\"ti ti-eye\" style=\"font-size:16px\"></i>";
        this.style.color=show?"var(--teal)":"var(--gray)";
      };
    });
  }
  if(sub==="notif"){
    const toggleBtn=sp.querySelector("#btn-push-toggle");
    if(toggleBtn)toggleBtn.onclick=async()=>{
      if(!("Notification" in window)){showToast("Browser tidak mendukung notifikasi");return;}
      if(!S.notif.pushOn){
        if(Notification.permission==="default"){
          const result=await Notification.requestPermission();
          if(result!=="granted"){showToast("Izin notifikasi ditolak");openSub("notif");return;}
        }
        if(Notification.permission!=="granted"){showToast("Izin notifikasi diblokir");openSub("notif");return;}
        S.notif.pushOn=true;showToast("🔔 Notifikasi push diaktifkan!");
      }else{
        S.notif.pushOn=false;showToast("Notifikasi push dinonaktifkan");
      }
      openSub("notif");
    };
  }
  if(sub==="theme"){
    sp.querySelectorAll("[data-theme-id]").forEach(card=>{
      card.onclick=()=>{
        S.themeId=card.dataset.themeId;
        applyTheme();
        openSub("theme");
        showToast("🎨 Tema warna diubah ke "+(THEMES.find(t=>t.id===S.themeId)||{}).name);
      };
    });
  }
  if(sub==="bantuan"){
    sp.querySelectorAll("[data-help-item]").forEach(el=>el.onclick=()=>showToast(el.dataset.helpItem));
    const wa=sp.querySelector("#btn-wa");if(wa)wa.onclick=()=>showToast(L("chatAdmin"));
    const vd=sp.querySelector("#btn-video");if(vd)vd.onclick=()=>showToast(L("videoTutorial"));
  }
}

    toggleHTML=`<div class="notif-row" style="margin-top:12px"><span style="font-size:14.5px;font-weight:600">Notifikasi Push</span><button class="toggle-sw" id="btn-push-toggle" style="background:${isOn?"var(--rose)":"var(--border)"}"><div class="knob" style="left:${isOn?"23px":"3px"}"></div></button></div>`;
  }
  return `<div class="back-header"><button class="back-btn" data-sub-back="main"><i class="ti ti-arrow-left" style="font-size:16px"></i></button><span style="font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--rose)">${L("notifications")}</span></div>

/* Tracking tulisan lokal untuk skip notif echo dari device sendiri */
const _recentLocalWrites=new Map(); /* "col:id" -> timestamp */
function markLocalWrite(col,id){
  _recentLocalWrites.set(col+":"+String(id),Date.now());
  if(_recentLocalWrites.size>200){
    const now=Date.now();
    _recentLocalWrites.forEach((t,k)=>{if(now-t>15000)_recentLocalWrites.delete(k);});
  }
}
function isRecentLocalWrite(col,id){
  const t=_recentLocalWrites.get(col+":"+String(id));
  if(t==null)return false;
  return (Date.now()-t)<8000;
}
async function fbSave(col,item){
  /* Simpan seluruh collection sebagai items array ke RTDB */
  if(!_rtdbReady||!_RD||!_uid)return;
  try{
    markLocalWrite(col,"_all");
    const arr=S[col]||[];
    const clean=JSON.parse(JSON.stringify({items:arr,_t:Date.now()}));
    const ref=_RD.ref(_rtdb,rtPath(col));
    await _RD.set(ref,clean);
    showSyncBadge();
  }catch(e){console.error("RTDB save",col,e.message);}
}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function loadFromRTDB(){
  if(!_rtdbReady||!_RD||!_uid)return false;
  try{
    const snap=await _RD.get(_RD.ref(_rtdb,`users/${_uid}`));
    if(!snap.exists())return false;
    const d=snap.val();
    /* Meta/settings & notif TIDAK diload dari RTDB — hanya dari Firestore */
    /* collections */
    const cols=["transactions","seserahan","souvenir","guests","documents","vendors","brismed","brismedItems","persiapan"];
    cols.forEach(col=>{
      if(d[col]){
        let items;
        if(Array.isArray(d[col].items)){
          /* Format baru: {items:[...], _t:...} */
          items=d[col].items.map(it=>{const c={...it};delete c._t;return c;});
        }else{
          /* Format lama (backward compat): {id1:{...}, id2:{...}} */
          items=Object.values(d[col]).filter(v=>v&&typeof v==="object"&&!Array.isArray(v)&&v.id!==undefined).map(it=>{const c={...it};delete c._t;return c;});
        }
        if(col==="transactions")items.sort((a,b)=>String(b.id).localeCompare(String(a.id)));
        S[col]=items;
      }
    });
    /* Log notifikasi — format per-item: notifLog/{time} → {msg,icon,time} */
    if(d.notifLog&&typeof d.notifLog==="object"){
      S.notifLog=Object.entries(d.notifLog)
        .filter(([k,v])=>v&&typeof v==="object"&&v.msg)
        .map(([k,v])=>({msg:v.msg,icon:v.icon||"ti-bell",time:Number(v.time)||0}))
        .sort((a,b)=>b.time-a.time).slice(0,50);
      updateNotifDot();
    }
    return true;
  }catch(e){console.error("loadFromRTDB",e.message);return false;}
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   REALTIME LISTENER (live sync antar perangkat)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let _rtListener=null;
let _rtFirstSnap=true; /* skip notif on initial load (saat app baru dibuka) */
const _colMeta={
  transactions:{label:"Transaksi",icon:"ti-report-money"},
  seserahan:{label:"Seserahan",icon:"ti-gift"},
  souvenir:{label:"Souvenir",icon:"ti-box-seam"},
  guests:{label:"Tamu",icon:"ti-users"},
  documents:{label:"Dokumen",icon:"ti-file-check"},
  vendors:{label:"Vendor",icon:"ti-building-store"},
  brismed:{label:"Bridesmaid",icon:"ti-user-plus"},
  brismedItems:{label:"Perlengkapan",icon:"ti-package"},
  persiapan:{label:"Persiapan",icon:"ti-backpack"}
};
function startRTDBListener(){
  if(!_rtdbReady||!_RD||!_uid)return;
  if(_rtListener)_rtListener();
  _rtFirstSnap=true;
  const ref=_RD.ref(_rtdb,`users/${_uid}`);
  _rtListener=()=>_RD.off(ref);
  _RD.onValue(ref,snap=>{
    if(!snap.exists()){_rtFirstSnap=false;return;}
    const d=snap.val();
    let changed=false;
    const isInitial=_rtFirstSnap;
    const remoteNotifs=[]; /* {msg, icon} yang akan dikirim sebagai push setelah semua kolom diproses */
    /* Update collections if remote is newer */
    const cols=["transactions","seserahan","souvenir","guests","documents","vendors","brismed","brismedItems","persiapan"];
    cols.forEach(col=>{
      if(d[col]){
        let items;
        if(Array.isArray(d[col].items)){
          /* Format baru: {items:[...], _t:...} */
          items=d[col].items.map(it=>{const c={...it};delete c._t;return c;});
        }else{
          /* Format lama (backward compat): {id1:{...}, id2:{...}} */
          items=Object.values(d[col]).filter(v=>v&&typeof v==="object"&&!Array.isArray(v)&&v.id!==undefined).map(it=>{const c={...it};delete c._t;return c;});
        }
        if(col==="transactions")items.sort((a,b)=>String(b.id).localeCompare(String(a.id)));
        const localStr=JSON.stringify(S[col]);
        const remoteStr=JSON.stringify(items);
        if(localStr!==remoteStr){
          if(isRecentLocalWrite(col,"_all")){
            /* Tulisan lokal sendiri — abaikan snapshot lama dari RTDB, jangan timpa state */
          }else{
            /* Perubahan dari perangkat lain — update state & deteksi item baru/berubah */
            if(!isInitial){
              const oldMap={};(S[col]||[]).forEach(it=>{oldMap[String(it.id)]=it;});
              const meta=_colMeta[col]||{label:col,icon:"ti-bell"};
              items.forEach(it=>{
                const prev=oldMap[String(it.id)];
                const itName=it.name||it.label||"";
                if(!prev){
                  remoteNotifs.push({msg:meta.label+" baru: \""+itName+"\" ditambahkan dari perangkat lain",icon:meta.icon});
                }else if(JSON.stringify(prev)!==JSON.stringify(it)){
                  remoteNotifs.push({msg:meta.label+" \""+itName+"\" diperbarui dari perangkat lain",icon:meta.icon});
                }
              });
            }
            S[col]=items;changed=true;
          }
        }
      }
    });
    if(changed){renderPage(curTab);showSyncBadge();}
    /* Sinkron realtime log notifikasi dari perangkat lain */
    if(d.notifLog&&typeof d.notifLog==="object"){
      const remoteLog=Object.entries(d.notifLog)
        .filter(([k,v])=>v&&typeof v==="object"&&v.msg)
        .map(([k,v])=>({msg:v.msg,icon:v.icon||"ti-bell",time:Number(v.time)||0}))
        .sort((a,b)=>b.time-a.time).slice(0,50);
      const localLogStr=JSON.stringify(S.notifLog||[]);
      const remoteLogStr=JSON.stringify(remoteLog);
      if(localLogStr!==remoteLogStr&&!isRecentLocalWrite("notifLog","_log")){
        S.notifLog=remoteLog;
        updateNotifDot();
        const sp=document.getElementById("subpage-container");
        if(sp&&sp.classList.contains("open")&&document.getElementById("notif-clear-btn")){
          sp.innerHTML=buildNotifPage();initNotifPageEvents();
        }
        showSyncBadge();
      }
    }
    /* Kirim push notifikasi untuk tiap perubahan dari device lain (maks 3 sekaligus biar tidak spam) */
    if(!isInitial&&remoteNotifs.length>0){
      const newNotifItems=[];
      remoteNotifs.slice(0,3).forEach(n=>{
        if(!S.notifLog)S.notifLog=[];
        const ni={msg:n.msg,icon:n.icon,time:Date.now()};
        S.notifLog.unshift(ni);newNotifItems.push(ni);
        sendPushNotif("Wedding Planner",n.msg);
      });
      if(S.notifLog&&S.notifLog.length>50)S.notifLog=S.notifLog.slice(0,50);
      updateNotifDot();
      newNotifItems.forEach(ni=>fbAddNotifItem(ni));
    }
    _rtFirstSnap=false;
  });
}

  /* Simpan satu notifikasi sebagai node per-item: notifLog/{time} → {msg,icon,time} */
  if(!_rtdbReady||!_RD||!_uid)return;
  try{
    markLocalWrite("notifLog","_log");
    const key=String(item.time);
    const clean={msg:item.msg,icon:item.icon||"ti-bell",time:item.time};
    const ref=_RD.ref(_rtdb,rtPath("notifLog/"+key));
    await _RD.set(ref,clean);
    showSyncBadge();
  }catch(e){console.error("RTDB notifLog add",e.message);}
}
async function fbClearNotifLog(){
  /* Hapus seluruh notifLog dari RTDB */
  if(!_rtdbReady||!_RD||!_uid)return;
  try{
    markLocalWrite("notifLog","_log");
    await _RD.remove(_RD.ref(_rtdb,rtPath("notifLog")));
    showSyncBadge();
  }catch(e){console.error("RTDB notifLog clear",e.message);}
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FIREBASE INIT (Firestore + Auth + RTDB)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function initFirebase(){
  try{
    const {initializeApp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const fb=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const au=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const rd=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");

    const app=initializeApp(FB_CONFIG);
    _db=fb.getFirestore(app);
    _auth=au.getAuth(app);
    /* Realtime Database */
    _rtdb=rd.getDatabase(app);
    _RD={ref:rd.ref,set:rd.set,get:rd.get,remove:rd.remove,onValue:rd.onValue,off:rd.off};
    _rtdbReady=true;

    _FS={doc:fb.doc,setDoc:fb.setDoc,getDoc:fb.getDoc,collection:fb.collection,getDocs:fb.getDocs,deleteDoc:fb.deleteDoc};
    _AU={signIn:au.signInWithEmailAndPassword,register:au.createUserWithEmailAndPassword,signOut:au.signOut,onAuthStateChanged:au.onAuthStateChanged,credential:(email,pass)=>au.EmailAuthProvider.credential(email,pass),reauthenticate:au.reauthenticateWithCredential,updatePassword:au.updatePassword};
    _fbReady=true;

    _AU.onAuthStateChanged(_auth,async user=>{
      if(user){
        _uid=user.uid;
        showLoadingOverlay("Memuat data...");
        /* Settings/profil SELALU dari Firestore, collections dari RTDB (lebih cepat) */
        await loadFromFirestore(); /* settings, notif — Firestore only */
        await loadFromRTDB();     /* collections (tx, tamu, dll) — RTDB */
        startRTDBListener();      /* live sync untuk collections */
        hideLoadingOverlay();
        launchApp();
      }else{
        _uid=null;
        if(_rtListener){_rtListener();_rtListener=null;}
        showLoginScreen();
      }
    });
  }catch(e){
    console.warn("Firebase tidak tersedia, mode lokal:",e.message);
    _fbReady=false;_rtdbReady=false;
    launchApp();
  }
}

async function fbDoSubmit(){

        var vid=b.dataset.okVendor;
        var v=S.vendors.find(x=>String(x.id)===String(vid));
        if(v){v.ok=!v.ok;refreshVendorList();fbSave("vendors",v);}
      };
    });
  };
})();
